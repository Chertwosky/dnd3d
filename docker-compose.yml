services:
  postgres:
    image: postgres:16-alpine
    container_name: dnd3d-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dnd3d
      POSTGRES_USER: dnd3d
      POSTGRES_PASSWORD: dnd3d
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnd3d -d dnd3d"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
